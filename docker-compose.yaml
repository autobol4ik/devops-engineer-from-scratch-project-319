name: hexlet-5

services:
  application:
    image: ${HEXLET_5_APP_IMAGE:?set HEXLET_5_APP_IMAGE}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hexlet_5
      SPRING_DATASOURCE_USERNAME: hexlet5
      SPRING_DATASOURCE_PASSWORD: ${HEXLET_5_DB_PASSWORD:?set HEXLET_5_DB_PASSWORD}
      STORAGE_S3_BUCKET: hexlet-5-bulletins
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESSKEY: ${HEXLET_5_S3_ACCESS_KEY:?set HEXLET_5_S3_ACCESS_KEY}
      STORAGE_S3_SECRETKEY: ${HEXLET_5_S3_SECRET_KEY:?set HEXLET_5_S3_SECRET_KEY}
      STORAGE_S3_CDNURL: http://127.0.0.1:${HEXLET_5_MINIO_PORT:-19000}/hexlet-5-bulletins
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${HEXLET_5_HTTP_PORT:-18080}:8080"
      - "127.0.0.1:${HEXLET_5_MANAGEMENT_PORT:-19090}:9090"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hexlet_5
      POSTGRES_USER: hexlet5
      POSTGRES_PASSWORD: ${HEXLET_5_DB_PASSWORD:?set HEXLET_5_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    networks:
      default:
        aliases:
          - hexlet-5-bulletins.minio
    environment:
      MINIO_ROOT_USER: ${HEXLET_5_S3_ACCESS_KEY:?set HEXLET_5_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${HEXLET_5_S3_SECRET_KEY:?set HEXLET_5_S3_SECRET_KEY}
      MINIO_DOMAIN: minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "127.0.0.1:${HEXLET_5_MINIO_PORT:-19000}:9000"
      - "127.0.0.1:${HEXLET_5_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${HEXLET_5_S3_ACCESS_KEY:?set HEXLET_5_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${HEXLET_5_S3_SECRET_KEY:?set HEXLET_5_S3_SECRET_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null &&
        mc mb --ignore-existing local/hexlet-5-bulletins >/dev/null &&
        mc anonymous set download local/hexlet-5-bulletins >/dev/null

volumes:
  postgres-data:
  minio-data:

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-hexlet-5-local}
