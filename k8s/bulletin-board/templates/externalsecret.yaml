{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bulletin-board.fullname" . }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.externalSecret.secretStoreName }}
  target:
    name: {{ required "externalSecret.targetSecretName is required" .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ required "externalSecret.lockboxId is required" $.Values.externalSecret.lockboxId }}
        property: {{ .property }}
    {{- end }}
{{- end }}
