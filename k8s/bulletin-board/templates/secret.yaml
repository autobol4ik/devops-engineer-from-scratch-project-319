{{- if .Values.bootstrapSecret.create }}
{{- if not .Values.bootstrapSecret.stringData }}
{{- fail "bootstrapSecret.stringData must be supplied outside Git when bootstrapSecret.create=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.existingSecret }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.bootstrapSecret.stringData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
