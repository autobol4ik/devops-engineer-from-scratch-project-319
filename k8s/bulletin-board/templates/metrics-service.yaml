apiVersion: v1
kind: Service
metadata:
  name: {{ include "bulletin-board.fullname" . }}-metrics
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "bulletin-board.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metricsService.port }}
      targetPort: metrics
      protocol: TCP
