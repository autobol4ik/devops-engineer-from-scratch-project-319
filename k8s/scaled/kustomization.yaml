apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../raw
  - poddisruptionbudget.yaml
  - ingress.yaml
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: hexlet-5-bulletin-board
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            minDomains: 2
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            matchLabelKeys:
              - pod-template-hash
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: bulletin-board
                app.kubernetes.io/instance: hexlet-5
