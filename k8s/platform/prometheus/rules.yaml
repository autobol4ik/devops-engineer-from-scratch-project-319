groups:
  - name: hexlet-5-bulletin-board
    rules:
      - alert: Hexlet5HighHttp5xxRatio
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{namespace="hexlet-5", service="hexlet-5-bulletin-board-metrics", status=~"5..", uri!~"/actuator.*"}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{namespace="hexlet-5", service="hexlet-5-bulletin-board-metrics", uri!~"/actuator.*"}[5m]))
          ) > 0.05
          and
          sum(rate(http_server_requests_seconds_count{namespace="hexlet-5", service="hexlet-5-bulletin-board-metrics", uri!~"/actuator.*"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          project: hexlet-5
        annotations:
          summary: More than five percent of application responses are 5xx
          description: The five-minute 5xx ratio has remained above 5% for five minutes.
      - alert: Hexlet5HighHttpP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(http_server_requests_seconds_bucket{namespace="hexlet-5", service="hexlet-5-bulletin-board-metrics", uri!~"/actuator.*"}[5m])
            )
          ) > 1
        for: 5m
        labels:
          severity: warning
          project: hexlet-5
        annotations:
          summary: Application p95 latency is above one second
          description: The five-minute p95 request latency has remained above one second for five minutes.
      - alert: Hexlet5ApplicationContainerRestarted
        expr: |
          sum(
            increase(kube_pod_container_status_restarts_total{
              namespace="hexlet-5",
              container="application",
              pod=~"hexlet-5-bulletin-board-.*"
            }[10m])
          ) > 0
        labels:
          severity: warning
          project: hexlet-5
        annotations:
          summary: Bulletin board container restarted
          description: At least one application container restart occurred during the last ten minutes.
