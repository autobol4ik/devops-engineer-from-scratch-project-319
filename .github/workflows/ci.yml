---
name: Project CI/CD

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: autobol4ik/hexlet-5-bulletin-board

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Check formatting and run backend tests
        run: ./gradlew spotlessCheck test --no-daemon

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform
      - name: Validate bootstrap root
        run: |
          terraform -chdir=terraform/bootstrap init -backend=false -lockfile=readonly
          terraform -chdir=terraform/bootstrap validate
      - name: Validate main root
        run: |
          terraform -chdir=terraform init -backend=false -lockfile=readonly
          terraform -chdir=terraform validate

  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.18.6
      - name: Lint and render the application chart
        run: |
          helm lint k8s/bulletin-board
          helm template hexlet-5 k8s/bulletin-board \
            --namespace hexlet-5 > "$RUNNER_TEMP/helm-default.yaml"
          helm lint k8s/bulletin-board \
            --values k8s/bulletin-board/values-prod.yaml \
            --set-string ingress.securityGroupId=hexlet-5-validation \
            --set-string externalSecret.lockboxId=hexlet5validation
          helm template hexlet-5 k8s/bulletin-board \
            --namespace hexlet-5 \
            --values k8s/bulletin-board/values-prod.yaml \
            --set-string ingress.securityGroupId=hexlet-5-validation \
            --set-string externalSecret.lockboxId=hexlet5validation \
            > "$RUNNER_TEMP/helm-prod.yaml"
      - name: Check production observability configuration
        run: |
          bash -n k8s/platform/prometheus/post-renderer.sh
          docker run --rm \
            --entrypoint promtool \
            --volume "$PWD/k8s/platform/prometheus:/work:ro" \
            --workdir /work \
            prom/prometheus:v3.12.0 \
            check rules rules.yaml

  image:
    needs:
      - backend
      - frontend
      - terraform
      - kubernetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and optionally publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: hexlet-5-production
      cancel-in-progress: false
    env:
      YC_DEPLOY_SA_ID: ${{ vars.YC_DEPLOY_SA_ID }}
      YC_CLUSTER_ID: ${{ vars.YC_CLUSTER_ID }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      YC_GWIN_SECURITY_GROUP_ID: ${{ vars.YC_GWIN_SECURITY_GROUP_ID }}
      YC_LOCKBOX_ID: ${{ vars.YC_LOCKBOX_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.18.6
      - uses: azure/setup-kubectl@v5
        with:
          version: v1.34.0
      - name: Request GitHub OIDC token
        id: oidc
        uses: actions/github-script@v9
        env:
          OIDC_AUDIENCE: https://github.com/autobol4ik
        with:
          result-encoding: string
          script: return await core.getIDToken(process.env.OIDC_AUDIENCE)
      - name: Exchange OIDC token for a Yandex IAM token
        env:
          GITHUB_OIDC_TOKEN: ${{ steps.oidc.outputs.result }}
        run: |
          set -euo pipefail
          test -n "$YC_DEPLOY_SA_ID"
          response="$(
            curl --fail --silent --show-error \
              --request POST https://auth.yandex.cloud/oauth/token \
              --header 'Content-Type: application/x-www-form-urlencoded' \
              --data-urlencode 'grant_type=urn:ietf:params:oauth:grant-type:token-exchange' \
              --data-urlencode 'requested_token_type=urn:ietf:params:oauth:token-type:access_token' \
              --data-urlencode "audience=$YC_DEPLOY_SA_ID" \
              --data-urlencode "subject_token=$GITHUB_OIDC_TOKEN" \
              --data-urlencode 'subject_token_type=urn:ietf:params:oauth:token-type:id_token'
          )"
          yc_token="$(jq -er '.access_token' <<< "$response")"
          echo "::add-mask::$yc_token"
          printf 'YC_IAM_TOKEN=%s\n' "$yc_token" >> "$GITHUB_ENV"
      - name: Install Yandex Cloud CLI
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            https://storage.yandexcloud.net/yandexcloud-yc/install.sh \
            --output "$RUNNER_TEMP/install-yc.sh"
          bash "$RUNNER_TEMP/install-yc.sh" \
            -i "$RUNNER_TEMP/yandex-cloud" -n
          echo "$RUNNER_TEMP/yandex-cloud/bin" >> "$GITHUB_PATH"
      - name: Create temporary kubeconfig
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
        run: |
          set -euo pipefail
          test -n "$YC_CLUSTER_ID"
          test -n "$YC_FOLDER_ID"
          yc config set folder-id "$YC_FOLDER_ID"
          yc managed-kubernetes cluster get-credentials \
            --id "$YC_CLUSTER_ID" --external --force \
            --kubeconfig "$KUBECONFIG"
          kubectl config current-context
      - name: Deploy immutable image
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
        run: |
          set -euo pipefail
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          test -n "$YC_GWIN_SECURITY_GROUP_ID"
          test -n "$YC_LOCKBOX_ID"
          helm upgrade --install hexlet-5 k8s/bulletin-board \
            --namespace hexlet-5 \
            --create-namespace \
            --values k8s/bulletin-board/values-prod.yaml \
            --set-string image.tag="$GITHUB_SHA" \
            --set-string existingSecret=hexlet-5-app-managed \
            --set-string externalSecret.targetSecretName=hexlet-5-app-managed \
            --set-string ingress.securityGroupId="$YC_GWIN_SECURITY_GROUP_ID" \
            --set-string externalSecret.lockboxId="$YC_LOCKBOX_ID" \
            --atomic --wait --timeout 10m
          kubectl --namespace hexlet-5 wait \
            --for=condition=Ready \
            externalsecret/hexlet-5-bulletin-board --timeout=5m
          kubectl rollout status deployment/hexlet-5-bulletin-board \
            --namespace hexlet-5 --timeout=10m
          deployed_image="$(
            kubectl --namespace hexlet-5 get \
              deployment/hexlet-5-bulletin-board \
              --output jsonpath='{.spec.template.spec.containers[0].image}'
          )"
          test "$deployed_image" = "$IMAGE_NAME:$GITHUB_SHA"
      - name: Remove temporary credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/kubeconfig"
